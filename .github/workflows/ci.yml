name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: typecheck → lint → test → build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: gharsetu
          POSTGRES_PASSWORD: gharsetu_dev_pw
          POSTGRES_DB: gharsetu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gharsetu"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://gharsetu:gharsetu_dev_pw@localhost:5432/gharsetu?schema=public
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api/v1

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm prisma generate

      - name: Build @gharsetu/shared (must succeed before apps consume it)
        run: pnpm --filter @gharsetu/shared build

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Lint (all packages)
        run: pnpm -r lint

      - name: Test (all packages)
        run: pnpm -r test

      - name: Build apps
        run: pnpm -r --filter "./apps/**" build
