<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · GharSetu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <main class="auth-shell">
    <!-- Step 1: Credential form -->
    <form id="login-step" class="auth-card" onsubmit="event.preventDefault(); document.getElementById('login-step').style.display='none'; document.getElementById('role-step').style.display='block';">
      <a href="index.html" class="auth-brand">Ghar<span>Setu</span></a>
      <div class="auth-tagline">Property Rental Management</div>
      <div class="text-center mb-6"><a href="index.html" class="text-royal-blue font-poppins font-semibold text-sm">← Back to home</a></div>

      <label class="label" for="email">Email or Phone</label>
      <input id="email" class="input" type="text" placeholder="raj@gharsetu.in or 98xxxxxxxx" autocomplete="username" required />

      <div class="mt-4">
        <label class="label" for="password">Password</label>
        <div class="relative">
          <input id="password" class="input pr-12" type="password" placeholder="••••••••" autocomplete="current-password" required minlength="8" />
          <button
            type="button"
            id="pw-toggle"
            aria-label="Show password"
            onclick="togglePassword()"
            class="absolute top-1/2 right-3 -translate-y-1/2 text-slate hover:text-charcoal focus:outline-none focus:ring-2 focus:ring-saffron focus:ring-offset-1 rounded p-1"
          >
            <svg id="pw-eye" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="pw-eye-off" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none;">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a19.77 19.77 0 0 1 4.22-5.22"/>
              <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a19.7 19.7 0 0 1-3.16 4.19"/>
              <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="mt-3 flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" /> <span class="muted">Remember me</span>
        </label>
        <a href="forgot-password.html" class="text-royal-blue font-poppins font-semibold">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary w-full mt-6">Login</button>

      <div class="mt-6 text-center text-xs muted">
        No public sign-up. Accounts are created by your Admin or Property Manager.
      </div>
    </form>

    <!-- Step 2: Role picker (shown after submit) -->
    <div id="role-step" class="auth-card" style="display:none;">
      <a href="index.html" class="auth-brand">Ghar<span>Setu</span></a>
      <div class="auth-tagline">Pick a role to demo</div>
      <div class="text-center mb-6 text-sm muted">This is a static prototype. In the live app, your role is detected from your account.</div>

      <div class="grid grid-cols-1 gap-3">
        <a href="admin/dashboard.html" class="btn btn-secondary auth-role-btn">Admin</a>
        <a href="pm/dashboard.html" class="btn btn-secondary auth-role-btn">Property Manager</a>
        <a href="maintenance/dashboard.html" class="btn btn-secondary auth-role-btn">Maintenance</a>
        <a href="tenant/dashboard.html" class="btn btn-secondary auth-role-btn">Tenant</a>
      </div>

      <div class="mt-6 text-center">
        <button type="button" class="text-royal-blue font-poppins font-semibold text-sm" onclick="document.getElementById('role-step').style.display='none'; document.getElementById('login-step').style.display='block';">← Back to login</button>
      </div>
    </div>
  </main>
  <script>
    function togglePassword() {
      var input = document.getElementById('password');
      var eye = document.getElementById('pw-eye');
      var eyeOff = document.getElementById('pw-eye-off');
      var btn = document.getElementById('pw-toggle');
      if (input.type === 'password') {
        input.type = 'text';
        eye.style.display = 'none';
        eyeOff.style.display = 'block';
        btn.setAttribute('aria-label', 'Hide password');
      } else {
        input.type = 'password';
        eye.style.display = 'block';
        eyeOff.style.display = 'none';
        btn.setAttribute('aria-label', 'Show password');
      }
    }
  </script>
  <script src="assets/validation.js"></script>
</body>
</html>
