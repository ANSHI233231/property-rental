# GharSetu — local dev infrastructure.
# Brings up Postgres 18 (per SRS §10). Background jobs run in-process via
# @nestjs/schedule — no Redis required.
# Production deployment uses managed services — this file is dev-only.
#
# Ports are intentionally NON-DEFAULT (5433) so the dev stack does not
# clash with any host-installed Postgres on the developer's machine.
# Update DATABASE_URL in `.env` to match.
#
# Postgres 18 note: per the official postgres:18-alpine image, the volume
# is mounted at /var/lib/postgresql (NOT /var/lib/postgresql/data) so that
# version-specific subdirs (`18/docker/`) live cleanly inside it. This is the
# upstream-recommended layout for 18+; old 17- mounts at /data won't start.

services:
  postgres:
    image: postgres:18-alpine
    container_name: gharsetu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gharsetu
      POSTGRES_PASSWORD: gharsetu_dev_pw
      POSTGRES_DB: gharsetu
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    ports:
      - "5433:5432"
    volumes:
      - gharsetu-pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gharsetu -d gharsetu"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gharsetu-pg-data:
